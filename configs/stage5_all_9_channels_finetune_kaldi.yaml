model:
  backbone:
    name: roformer
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 16
    vocab_size: 1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    embedding_type: null
    downstream: tokens
  channels:
    - name: heartbeat
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
    - name: breath
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
    - name: eeg_original
      input_dim: 3840
      tokenizer:
        name: sundial
        out_dim: 768
    - name: ecg_original
      input_dim: 3840
      tokenizer:
        name: sundial
        out_dim: 768
    - name: eog_original
      input_dim: 3840
      tokenizer:
        name: sundial
        out_dim: 768
    - name: emg_original
      input_dim: 3840
      tokenizer:
        name: sundial
        out_dim: 768
    - name: spo2
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
    - name: resp_original
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
    - name: resp_nasal_original
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
  head:
    name: classification
    dropout: 0.1
    hidden_dim: null
    channel_agg:
      name: gated_scalar
      kwargs: {}
    temporal_agg:
      name: mean
      kwargs: {}
data:
  backend: kaldi
  kaldi_data_root: index/kaldi_stage5_all_9_channels
  kaldi_manifest: index/kaldi_stage5_all_9_channels/manifest.json
  max_tokens: 1535
  data_channel_names: null
  finetune_data_index: null
  finetune_preset_path: null
  train_dataset_names: []
  test_dataset_names: []
  n_few_shot: 0
finetune:
  freeze_tokenizer: true
  loss:
    class_weights: null
    pos_weight: null
  sampler:
    weighted_random: false
  layer_mix:
    enabled: false
    shared_across_modalities: false
    layer_indices: null
  lora:
    freeze_backbone_and_insert_lora: false
    insert_lora: true
    separate_adapters: false
  task:
    type: classification
    output_dim: 5
    is_seq: true
    monitor: val_accuracy
    monitor_mod: max
  eval_visualizations:
    enabled: true
    stages: [val, test]
    confusion_matrix:
      enabled: true
      show_raw_counts: false
    roc_curve:
      enabled: false
    regression_scatter:
      enabled: false
preset_build:
  required_channels:
    - heartbeat
    - breath
    - eeg_original
    - ecg_original
    - eog_original
    - emg_original
    - spo2
    - resp_original
    - resp_nasal_original
    - stage5
  min_channels: 10
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
