recipe: sleep2wave
stage: diffusion

data:
  preset_path: data/sleep2wave_medium_preset.pkl
  context_epochs: 15

modalities:
  epoch_sec: 30
  all: [eeg, eog, emg, ecg, airflow, belt, spo2, ibi, resp]
  high_frequency: [eeg, eog, emg, ecg]
  low_frequency: [airflow, belt, spo2, ibi, resp]
  sample_rates: {eeg: 128, eog: 128, emg: 128, ecg: 128, airflow: 4, belt: 4, spo2: 4, ibi: 4, resp: 4}
  frames_per_epoch: {eeg: 3840, eog: 3840, emg: 3840, ecg: 3840, airflow: 120, belt: 120, spo2: 120, ibi: 120, resp: 120}

diffusion:
  latent_dim: 768
  autoencoder_checkpoint: checkpoints/sleep2wave_autoencoder_medium.ckpt
  transformer: {hidden_size: 768, num_layers: 12, num_heads: 16, mlp_ratio: 4}
  diffusion_steps: 1000
  beta_schedule: cosine
  prediction_type: epsilon
  context_epochs: 15
  embeddings: {diffusion_step: true, modality: true, epoch_position: true, sleep_night_position: true, availability: true, quality: true}
  task_attention_mask: directional
  auxiliary_restoration_token: true
  condition_dropout: 0.15
  validation_examples:
    num_examples: 5
    modalities: [eeg, eog, emg, ecg, airflow, belt, spo2, ibi, resp]

training:
  phase: 3
  phase_checkpoint: outputs/sleep2wave_diffusion_medium_phase2/phase2/checkpoints/last.ckpt
  batch_size: 8
  lr: 0.00002
  weight_decay: 0.01
  max_epochs: 160
  gradient_clip_val: 1.0
  condition_counts: [1, 2]
  restoration_condition_counts: [1, 2, 3]
  replay: {enabled: true}
  corruptions:
    restoration:
      default: {name: gaussian_noise, kwargs: {std: 0.05}}
      by_modality:
        eeg:
          choices:
            - {weight: 0.7, name: high_frequency_contamination, kwargs: {amplitude: 0.10, cycles: 40.0}}
            - {weight: 0.3, name: gaussian_noise, kwargs: {std: 0.05}}
        eog: {name: spike_artifact, kwargs: {num_spikes: 8, magnitude: 3.0}}
        emg: {name: high_frequency_contamination, kwargs: {amplitude: 0.15, cycles: 50.0}}
        ecg: {name: baseline_drift, kwargs: {amplitude: 0.10}}
        airflow: {name: airflow_cannula_displacement, kwargs: {attenuation: 0.25}}
        belt: {name: amplitude_attenuation, kwargs: {factor: 0.35}}
        spo2: {name: saturation_clipping, kwargs: {min_value: 80.0, max_value: 100.0}}
        ibi: {name: rpeak_drop_or_jitter_for_ibi, kwargs: {window_frames: 12}}
        resp: {name: baseline_drift, kwargs: {amplitude: 0.10}}
    imputation:
      default: {name: contiguous_window_mask, kwargs: {window_frames: 120}}
      by_modality:
        eeg: {name: contiguous_window_mask, kwargs: {window_frames: 384}}
        eog: {name: contiguous_window_mask, kwargs: {window_frames: 384}}
        emg: {name: contiguous_window_mask, kwargs: {window_frames: 384}}
        ecg: {name: contiguous_window_mask, kwargs: {window_frames: 384}}
        airflow: {name: contiguous_window_mask, kwargs: {window_frames: 24}}
        belt: {name: belt_failure, kwargs: {window_frames: 24}}
        spo2: {name: spo2_plateau_dropout, kwargs: {window_frames: 24}}
        ibi: {name: rpeak_drop_or_jitter_for_ibi, kwargs: {window_frames: 12}}
        resp: {name: contiguous_window_mask, kwargs: {window_frames: 24}}

sampler: {name: ddim, steps: 20, eta: 0.0, num_samples: 1}
export: {output_dir: outputs/sleep2wave_diffusion_medium_phase3}
