model:
  backbone:
    name: roformer
    hidden_size: 384
    num_hidden_layers: 12
    num_attention_heads: 16
    vocab_size: 1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 384
    out_dim: 128
  cls:
    embedding_type: null
    downstream: tokens
  channels:
    - name: ppg_green
      source_names: ['G0-PD0', 'G0-PD1', 'G1-PD0', 'G1-PD1']
      input_dim: 500  # 2 s * 256 Hz per token; token windows remain non-overlapping in the current data pipeline
      tokenizer:
        name: resnet1d
        out_dim: 384
        kwargs:
          block_counts: [2, 2, 2]
          channel_schedule: [64, 128, 256]
          stride_schedule: [2, 2, 2]
          front_kernel_size: 7
          front_stride: 2
          front_pool: max
          front_pool_stride: 2
          norm: group
          norm_groups: 8
          act: relu
          dropout: 0.1
    - name: ppg_infrared
      source_names: ['IR0-PD0', 'IR0-PD1']
      input_dim: 500  # 2 s * 256 Hz per token; token windows remain non-overlapping in the current data pipeline
      tokenizer:
        name: resnet1d
        out_dim: 384
        kwargs:
          block_counts: [2, 2, 2]
          channel_schedule: [64, 128, 256]
          stride_schedule: [2, 2, 2]
          front_kernel_size: 7
          front_stride: 2
          front_pool: max
          front_pool_stride: 2
          norm: group
          norm_groups: 8
          act: relu
          dropout: 0.1
    - name: gyro_vm
      source_names: ["gyro_x", "gyro_y", "gyro_z"]
      input_dim: 500  # 2 s * 100 Hz per token; adjust if your gyroscope VM sampling rate differs
      tokenizer:
        name: sundial2
        out_dim: 384
        kwargs:
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: acc_vm
      source_names: ["acc_x", "acc_y", "acc_z"]
      input_dim: 500  # 2 s * 100 Hz per token; adjust if your accelerometer VM sampling rate differs
      tokenizer:
        name: sundial2
        out_dim: 384
        kwargs:
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
loss:
  name: info_nce
  temperature: 0.2
data:
  mask_rate: 0.15
  token_sec: 2
  max_tokens: 30  # 60 s clip with 2 s non-overlapping tokens
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
