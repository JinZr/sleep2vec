model:
  backbone:
    name: roformer
    hidden_size: 384
    num_hidden_layers: 12
    num_attention_heads: 16
    vocab_size: 1
    attention_backend: sdpa
  projection:
    name: simclr
    enabled: true
    hidden_dim: 384
    out_dim: 128
  cls:
    embedding_type: null
    downstream: tokens
  channels:
    - name: ppg_green
      input_dim: 512
      tokenizer:
        name: resnet1d
        out_dim: 384
        kwargs:
          block_counts: [2, 2, 2]
          channel_schedule: [64, 128, 256]
          stride_schedule: [2, 2, 2]
          front_kernel_size: 7
          front_stride: 2
          front_pool: max
          front_pool_stride: 2
          norm: group
          norm_groups: 8
          act: relu
          dropout: 0.1
    - name: ppg_red
      input_dim: 512
      tokenizer:
        name: resnet1d
        out_dim: 384
        kwargs:
          block_counts: [2, 2, 2]
          channel_schedule: [64, 128, 256]
          stride_schedule: [2, 2, 2]
          front_kernel_size: 7
          front_stride: 2
          front_pool: max
          front_pool_stride: 2
          norm: group
          norm_groups: 8
          act: relu
          dropout: 0.1
    - name: ppg_infrared
      input_dim: 512
      tokenizer:
        name: resnet1d
        out_dim: 384
        kwargs:
          block_counts: [2, 2, 2]
          channel_schedule: [64, 128, 256]
          stride_schedule: [2, 2, 2]
          front_kernel_size: 7
          front_stride: 2
          front_pool: max
          front_pool_stride: 2
          norm: group
          norm_groups: 8
          act: relu
          dropout: 0.1
    - name: gyro_vm
      input_dim: 200
      tokenizer:
        name: sundial2
        out_dim: 384
        kwargs:
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: acc_vm
      input_dim: 200
      tokenizer:
        name: sundial2
        out_dim: 384
        kwargs:
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
  head:
    name: regression
    dropout: 0.1
    hidden_dim: null
    channel_agg:
      name: mean
      kwargs: {}
    temporal_agg:
      name: mean
      kwargs: {}
data:
  max_tokens: 30
  data_channel_names: [ppg_green, ppg_red, ppg_infrared, gyro_vm, acc_vm]
  finetune_data_index: null
  finetune_preset_path: null
  train_dataset_names: []
  test_dataset_names: []
  n_few_shot: 0
finetune:
  freeze_tokenizer: true
  layer_mix:
    enabled: false
    shared_across_modalities: false
    layer_indices: null
  lora:
    freeze_backbone_and_insert_lora: false
    insert_lora: false
    separate_adapters: false
  task:
    type: regression
    output_dim: 1
    is_seq: false
    monitor: val_mae
    monitor_mod: min
  eval_visualizations:
    enabled: true
    stages: [val, test]
    confusion_matrix:
      enabled: false
    roc_curve:
      enabled: false
    regression_scatter:
      enabled: true
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
