model:
  backbone:
    name: roformer
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 16
    vocab_size: 1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    embedding_type: null
    downstream: tokens
  channels:
    - name: heartbeat
      alias: psg_heartbeat
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: breath
      alias: psg_breath
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: eeg_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: ecg_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: eog_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: emg_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: spo2
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: resp_original
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: resp_nasal_original
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: ppg
      input_dim: 3000
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: actigraphy
      input_dim: 960
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
loss:
  name: info_nce
  temperature: 0.2
data:
  mask_rate: 0.15
  max_tokens: 120
adapt:
  new_channels: [ppg, actigraphy]
  stage1:
    train_shared_projection: false
  stage2:
    lr_scales:
      encoder: 0.1
      shared_legacy: 0.5
      new_modalities: 1.0
    pair_schedule:
      - until: 0.25
        new_pair_ratio: 1.0
      - until: 0.50
        new_pair_ratio: 0.7
      - until: 0.75
        new_pair_ratio: 0.5
      - until: 1.0
        new_pair_ratio: 0.34545454545454546  # 19/55 active pairs touch ppg or actigraphy_vm, making this final stage uniform over active pairs
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
