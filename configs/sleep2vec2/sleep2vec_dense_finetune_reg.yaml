model:
  backbone:
    name: roformer
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 16
    vocab_size: 1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    embedding_type: bert    # null -> no CLS, "bert" -> prepend learnable CLS token
    downstream: cls         # "tokens" or "cls" (required)
  channels:
    - name: heartbeat
      aliases: [psg_heartbeat]
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: breath
      aliases: [psg_breath]
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: eeg_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: ecg_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: eog_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: emg_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: spo2
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: resp_original
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
    - name: resp_nasal_original
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
  head:
    name: regression
    dropout: 0.1
    hidden_dim: null
    channel_agg:
      name: mean
      kwargs: {}
    temporal_agg:
      name: mean
      kwargs: {}
data:
  max_tokens: 120
  data_channel_names: null
  finetune_data_index: null
  finetune_preset_path: null
  train_dataset_names: [shhs]
  test_dataset_names: [shhs]
  n_few_shot: 1280
finetune:
  freeze_tokenizer: true
  loss:
    class_weights: null
    pos_weight: null
  sampler:
    weighted_random: false
  layer_mix:
    enabled: false
    shared_across_modalities: false
    layer_indices: null     # 1-based transformer block indices; null -> all
  lora:
    freeze_backbone_and_insert_lora: false
    insert_lora: false
    separate_adapters: false
  eval_visualizations:
    enabled: true
    stages: [val, test]
    confusion_matrix:
      enabled: false
    regression_scatter:
      enabled: true

model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
