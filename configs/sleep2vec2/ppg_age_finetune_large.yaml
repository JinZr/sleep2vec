model:
  backbone:
    name: roformer
    hidden_size: 1024
    num_hidden_layers: 16
    num_attention_heads: 16
    vocab_size: 1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    embedding_type: null
    downstream: tokens
  channels:
    - name: ppg
      input_dim: 3000  # 30 s * 100 Hz; change if your PPG sampling rate differs
      tokenizer:
        name: sundial
        out_dim: 768
  head:
    name: regression
    dropout: 0.1
    hidden_dim: null
    channel_agg:
      name: mean
      kwargs: {}
    temporal_agg:
      name: mean
      kwargs: {}
data:
  max_tokens: 1535  # whole-night cap in 30 s epochs
  data_channel_names: [ppg]
  finetune_data_index: null
  finetune_preset_path: new_index/ppg_age_wholenight_merged_preset_1535_age.pickle
  train_dataset_names: []
  test_dataset_names: []
  n_few_shot: 0
finetune:
  freeze_tokenizer: true
  layer_mix:
    enabled: false
    shared_across_modalities: false
    layer_indices: null
  lora:
    freeze_backbone_and_insert_lora: false
    insert_lora: false
    separate_adapters: false
  task:
    type: regression
    output_dim: 1
    is_seq: false
    monitor: val_mae
    monitor_mod: min
  eval_visualizations:
    enabled: true
    stages: [val, test]
    confusion_matrix:
      enabled: false
    regression_scatter:
      enabled: true
preset_build:
  required_channels: [ppg]
  min_channels: 1
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
