model:
  backbone:
    name: roformer
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 16
    vocab_size: 1
    attention_backend: sdpa
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    embedding_type: null    # null -> no CLS, "bert" -> prepend learnable CLS token
    downstream: tokens      # "tokens" or "cls" (required)
  channels:
    - name: heartbeat
      alias: psg_heartbeat
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: false
          residual_scale: 0.1
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
          num_mlp_layers: 3
    - name: breath
      alias: psg_breath
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: false
          residual_scale: 0.1
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
          num_mlp_layers: 3
    - name: eeg_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: false
          residual_scale: 0.1
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
          num_mlp_layers: 3
    - name: ecg_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: false
          residual_scale: 0.1
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
          num_mlp_layers: 3
    - name: eog_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: false
          residual_scale: 0.1
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
          num_mlp_layers: 3
    - name: emg_original
      input_dim: 3840
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: false
          residual_scale: 0.1
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
          num_mlp_layers: 3
    - name: spo2
      input_dim: 120
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: false
          residual_scale: 0.1
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
          num_mlp_layers: 3
    - name: resp_original
      input_dim: 120
