        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: false
          residual_scale: 0.1
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
          num_mlp_layers: 3
    - name: resp_nasal_original
      input_dim: 120
