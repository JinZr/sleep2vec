          clamp_value: null
          modality_scale: 1.0
          num_mlp_layers: 3
loss:
  name: weighted_info_nce
  temperature: 0.2
  params:
    hard_scale: 0.10
    pos_margin: 0.0
data:
  mask_rate: 0.15
  max_tokens: 120
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
