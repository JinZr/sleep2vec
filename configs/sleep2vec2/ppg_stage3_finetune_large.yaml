model:
  backbone:
    name: roformer
    hidden_size: 1024
    num_hidden_layers: 16
    num_attention_heads: 16
    vocab_size: 1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    embedding_type: null
    downstream: tokens
  channels:
    - name: ppg
      input_dim: 3000  # 30 s * 100 Hz; change if your PPG sampling rate differs
      tokenizer:
        name: sundial2
        out_dim: 768
        kwargs:
          norm_layer: true
          pre_norm: true
          residual_scale: 0.5
          ff_scale: 1.0
          clamp_value: null
          modality_scale: 1.0
  head:
    name: classification
    dropout: 0.1
    hidden_dim: null
    channel_agg:
      name: gated_scalar
      kwargs: {}
    temporal_agg:
      name: mean
      kwargs: {}
data:
  max_tokens: 1535  # whole-night cap in 30 s epochs
  data_channel_names: [ppg]
  finetune_data_index: null
  finetune_preset_path: null
  train_dataset_names: []
  test_dataset_names: []
  n_few_shot: 0
finetune:
  freeze_tokenizer: true
  loss:
    class_weights: null
    pos_weight: null
  sampler:
    weighted_random: false
  layer_mix:
    enabled: false
    shared_across_modalities: false
    layer_indices: null
  lora:
    freeze_backbone_and_insert_lora: false
    insert_lora: false
    separate_adapters: false
  task:
    type: classification
    output_dim: 3
    is_seq: true
    monitor: val_accuracy
    monitor_mod: max
  eval_visualizations:
    enabled: true
    stages: [val, test]
    confusion_matrix:
      enabled: true
      show_raw_counts: false
    regression_scatter:
      enabled: false
preset_build:
  required_channels: [ppg, stage5]
  min_channels: 2
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
