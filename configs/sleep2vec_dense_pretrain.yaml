model:
  backbone:
    name: roformer
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 16
    vocab_size: 1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    strategy: null          # null -> no CLS, "bert" -> prepend learnable CLS token
    downstream: tokens      # "tokens" or "cls" (required)
  channels:
    - name: heartbeat
      input_dim: 120
      out_dim: 768
      tokenizer: sundial
    - name: breath
      input_dim: 120
      out_dim: 768
      tokenizer: sundial
    - name: eeg_original
      input_dim: 3840
      out_dim: 768
      tokenizer: sundial
    - name: ecg_original
      input_dim: 3840
      out_dim: 768
      tokenizer: sundial
    - name: eog_original
      input_dim: 3840
      out_dim: 768
      tokenizer: sundial
    - name: emg_original
      input_dim: 3840
      out_dim: 768
      tokenizer: sundial
    - name: spo2
      input_dim: 120
      out_dim: 768
      tokenizer: sundial
    - name: resp_original
      input_dim: 120
      out_dim: 768
      tokenizer: sundial
    - name: resp_nasal_original
      input_dim: 120
      out_dim: 768
      tokenizer: sundial
  head:
    name: classification
    dropout: 0.1
    hidden_dim: null
    channel_agg:
      name: gated_scalar
      kwargs: {}
loss:
  name: weighted_info_nce
  temperature: 0.2
  params:
    hard_scale: 0.10
    pos_margin: 0.0
data:
  mask_rate: 0.15
  max_tokens: 120
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
