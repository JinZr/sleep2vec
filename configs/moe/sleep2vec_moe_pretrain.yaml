model:
  backbone:
    name: switch_roformer
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 16
    vocab_size: 1
    config_overrides:
      num_experts: 8
      num_sparse_encoder_layers: 3
      expert_capacity: 32
      router_z_loss_coef: 0.001
      router_aux_loss_coef: 0.001
      add_router_probs: true
      rope_theta: 10000.0
      rope_max_position_embeddings: 4096
      rope_partial_rotary_factor: 1.0
      dropout_rate: 0.1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  channels:
    - name: heartbeat
      input_dim: 120
      out_dim: 768
      tokenizer: sundial
    - name: breath
      input_dim: 120
      out_dim: 768
      tokenizer: sundial
    - name: eeg_original
      input_dim: 3840
      out_dim: 768
      tokenizer: sundial
    - name: ecg_original
      input_dim: 3840
      out_dim: 768
      tokenizer: sundial
    - name: eog_original
      input_dim: 3840
      out_dim: 768
      tokenizer: sundial
    - name: emg_original
      input_dim: 3840
      out_dim: 768
      tokenizer: sundial
    - name: spo2
      input_dim: 120
      out_dim: 768
      tokenizer: sundial
    - name: resp_original
      input_dim: 120
      out_dim: 768
      tokenizer: sundial
    - name: resp_nasal_original
      input_dim: 120
      out_dim: 768
      tokenizer: sundial
  head:
    name: classification
    agg: gated_scalar
    dropout: 0.1
    hidden_dim: null
loss:
  name: weighted_info_nce
  temperature: 0.2
  params:
    hard_scale: 0.10
    pos_margin: 0.0
    router_lb_coef: 0.001
data:
  mask_rate: 0.15
  max_tokens: 120
