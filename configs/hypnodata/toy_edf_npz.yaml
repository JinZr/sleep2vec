center: toy
record_discovery:
  type: glob
  root: tests/fixtures/sample_dataset
  pattern: "*.edf"
  metadata:
    source: toy
    split: train
backend:
  type: npz
signals:
  eeg:
    kind: eeg
    required: true
    target_sfreq: 10
    target_unit: uV
    candidates:
      - label: "EEG C3"
        priority: 10
    scale: 1.0
    polarity: normal
    preprocess:
      - finite_check
      - truncate_to_common
  spo2:
    kind: spo2
    required: false
    target_sfreq: 1
    target_unit: "%"
    candidates:
      - regex: "^SpO2"
        priority: 5
    preprocess:
      - finite_check
      - truncate_to_common
