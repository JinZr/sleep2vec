model:
  backbone:
    name: roformer
    hidden_size: 1024
    num_hidden_layers: 16
    num_attention_heads: 16
    vocab_size: 1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    embedding_type: bert
    downstream: tokens
  channels:
    - name: ppg
      input_dim: 3000  # 30 s * 100 Hz; change if your PPG sampling rate differs
      tokenizer:
        name: sundial
        out_dim: 768
  head:
    name: regression
    dropout: 0.1
    hidden_dim: null
    channel_agg:
      name: gated_scalar
      kwargs: {}
    temporal_agg:
      name: mean
      kwargs: {}
data:
  max_tokens: 1535  # whole-night cap in 30 s epochs
  data_channel_names: [ppg]
  finetune_data_index: null
  finetune_preset_path: null
  train_dataset_names: []
  test_dataset_names: []
  n_few_shot: 0
finetune:
  freeze_tokenizer: true
  loss:
    class_weights: null
    pos_weight: null
  sampler:
    weighted_random: false
  layer_mix:
    enabled: false
    shared_across_modalities: false
    layer_indices: null
  lora:
    freeze_backbone_and_insert_lora: false
    insert_lora: true
    separate_adapters: false
  task:
    type: survival
    output_dim: 177
    is_seq: false
    monitor: val_loss
    monitor_mod: min
  survival:
    key_column: eid
    disease_columns_index: /path/to/disease_columns.txt
    event_time_index: /path/to/event_time.csv
    is_event_index: /path/to/is_event.csv
    has_label_index: /path/to/has_label.csv
    covariates: [age, sex]
    covariate_embedding_dim: 16
  eval_visualizations:
    enabled: false
    stages: [val, test]
    confusion_matrix:
      enabled: false
    roc_curve:
      enabled: false
    regression_scatter:
      enabled: false
preset_build:
  required_channels: [ppg]
  min_channels: 1
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
