model:
  backbone:
    name: roformer
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 16
    vocab_size: 1
    moe:
      enabled: true
      layer_indices: [4, 6, 8, 10]
      num_experts: 16
      top_k: 2
      expert_hidden_size: 1536
      router_type: learned
      router_noise: 0.0
      router_z_loss_coef: 0.001
      router_entropy_coef: 0.0
      load_balance_coef: 0.01
      modality_balance_coef: 0.01
      route_consistency_coef: 0.01
      expert_diversity_coef: 0.0
      expert_dropout_prob: 0.0
      use_modality_group_mask: true
      expert_groups:
        shared: [0, 1]
        neuro: [2, 3, 4, 5]
        cardiac: [6, 7, 8]
        respiratory: [9, 10, 11]
        oxygenation: [12, 13]
        wearable_activity: [14]
        artifact: [15]
      modality_to_groups:
        heartbeat: [shared, cardiac, artifact]
        breath: [shared, respiratory, artifact]
        eeg_original: [shared, neuro, artifact]
        ecg_original: [shared, cardiac, artifact]
        eog_original: [shared, neuro, artifact]
        emg_original: [shared, neuro, artifact]
        spo2: [shared, oxygenation, artifact]
        resp_original: [shared, respiratory, artifact]
        resp_nasal_original: [shared, respiratory, artifact]
      route_consistency_layers: [10]
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    embedding_type: null
    downstream: tokens
  channels:
    - name: heartbeat
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
    - name: breath
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
  head:
    name: classification
    dropout: 0.1
    hidden_dim: null
    channel_agg:
      name: gated_scalar
      kwargs: {}
    temporal_agg:
      name: mean
      kwargs: {}
data:
  max_tokens: 1535
  data_channel_names: [heartbeat, breath]
  finetune_data_index: null
  finetune_preset_path: index_iclr2/presets_heartbeat_breath_stage5/heartbeat_breath_stage5_wholenight_merged_preset_1535.pickle
  train_dataset_names: []
  test_dataset_names: []
  n_few_shot: 0
finetune:
  freeze_tokenizer: true
  moe_tuning:
    mode: conservative_full_router_frozen
    lr_scales:
      head: 1.0
      backbone: 0.1
      experts: 0.1
      routers: 0.0
      tokenizers: 0.0
      projection: 0.0
    moe_regularization:
      enabled: false
  layer_mix:
    enabled: false
    shared_across_modalities: false
    layer_indices: null
  lora:
    freeze_backbone_and_insert_lora: false
    insert_lora: false
    separate_adapters: false
  task:
    type: classification
    output_dim: 5
    is_seq: true
    monitor: val_accuracy
    monitor_mod: max
  eval_visualizations:
    enabled: true
    stages: [val, test]
    confusion_matrix:
      enabled: true
    roc_curve:
      enabled: true
    regression_scatter:
      enabled: false
preset_build:
  required_channels: [heartbeat, breath, stage5]
  min_channels: 3
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
