model:
  backbone:
    name: roformer
    hidden_size: 1024
    num_hidden_layers: 16
    num_attention_heads: 16
    vocab_size: 1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    embedding_type: bert
    downstream: tokens
  channels:
    - name: heartbeat
      alias: psg_heartbeat
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
    - name: breath
      alias: psg_breath
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
  head:
    name: classification
    dropout: 0.1
    hidden_dim: null
    channel_agg:
      name: gated_scalar
      kwargs: {}
    temporal_agg:
      name: mean
      kwargs: {}
data:
  max_tokens: 1535  # whole-night cap in 30 s epochs
  data_channel_names: [heartbeat, breath]
  finetune_data_index: null
  finetune_preset_path: null
  train_dataset_names: []
  test_dataset_names: []
  n_few_shot: 0
finetune:
  freeze_tokenizer: true
  loss:
    class_weights: null
    pos_weight: null
  sampler:
    weighted_random: false
  layer_mix:
    enabled: false
    shared_across_modalities: false
    layer_indices: null
  lora:
    freeze_backbone_and_insert_lora: false
    insert_lora: true
    separate_adapters: false
  task:
    type: classification
    output_dim: 30
    is_seq: true
    monitor: val_ahi_pearson
    monitor_mod: max
  eval_visualizations:
    enabled: true
    stages: [val, test]
    confusion_matrix:
      enabled: false
    roc_curve:
      enabled: false
    regression_scatter:
      enabled: true
preset_build:
  required_channels: [heartbeat, breath, ahi, stage5]
  min_channels: 4
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
