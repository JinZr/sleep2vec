model:
  name: sex_age_mlp
  features: [age, sex]
  age:
    transform: divide
    scale: 100.0
    embedding_dim: 16
  sex:
    encoding: binary
    embedding_dim: 16
  head:
    hidden_dim: 32
    dropout: 0.1
    activation: elu

data:
  index: /path/to/index.csv
  split_column: split
  key_column: eid
  deduplicate_by_key: true

finetune:
  task:
    type: survival
    output_dim: 177
    is_seq: false
    monitor: val_c_index
    monitor_mod: max
  survival:
    key_column: eid
    disease_columns_index: /path/to/disease_columns.txt
    event_time_index: /path/to/event_time.csv
    is_event_index: /path/to/is_event.csv
    has_label_index: /path/to/has_label.csv

outputs:
  prediction_csv: true
  per_disease_metrics_csv: true

