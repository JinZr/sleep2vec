model:
  backbone:
    name: roformer
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 16
    vocab_size: 1
    config_overrides:
      moe_enabled: true
      moe_num_experts: 8
      moe_top_k: 1
      moe_layers: "every_2"
      moe_capacity_factor_train: 1.25
      moe_capacity_factor_eval: 2.0
      moe_aux_loss_coef: 1.0e-2
      moe_z_loss_coef: 0.0
      moe_router_noise_std: 0.0
      moe_router_use_context: true
      moe_router_ctx_dim: 128
      moe_source_vocab_size: 64
      moe_ctx_use_age: true
      moe_ctx_use_sex: true
      moe_ctx_use_source: true
      moe_ctx_use_modality: true
      moe_group_balance_coef: 1.0e-3
      moe_group_keys: ["modality"]
  projection:
    name: simclr
    enabled: true
    hidden_dim: 768
    out_dim: 128
  cls:
    embedding_type: bert
    downstream: tokens
  channels:
    - name: heartbeat
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
    - name: breath
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
    - name: eeg_original
      input_dim: 3840
      tokenizer:
        name: sundial
        out_dim: 768
    - name: ecg_original
      input_dim: 3840
      tokenizer:
        name: sundial
        out_dim: 768
    - name: eog_original
      input_dim: 3840
      tokenizer:
        name: sundial
        out_dim: 768
    - name: emg_original
      input_dim: 3840
      tokenizer:
        name: sundial
        out_dim: 768
    - name: spo2
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
    - name: resp_original
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
    - name: resp_nasal_original
      input_dim: 120
      tokenizer:
        name: sundial
        out_dim: 768
loss:
  name: weighted_info_nce
  temperature: 0.2
  params:
    hard_scale: 0.10
    pos_margin: 0.0
data:
  mask_rate: 0.15
  max_tokens: 120
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true
