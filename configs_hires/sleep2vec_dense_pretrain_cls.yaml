model:
  backbone:
    name: roformer
    hidden_size: 256
    num_hidden_layers: 4
    num_attention_heads: 8      # 256/8=32 dim per head
    vocab_size: 1
  projection:
    name: simclr
    enabled: true
    hidden_dim: 256
    out_dim: 128
  cls:
    embedding_type: bert
    downstream: tokens
  channels:
    - name: heartbeat
      input_dim: 12
      tokenizer: 
        name: sundial
        out_dim: 256
    - name: breath
      input_dim: 12
      tokenizer: 
        name: sundial
        out_dim: 256
    - name: eeg_original
      input_dim: 384
      tokenizer: 
        name: sundial
        out_dim: 256
    - name: ecg_original
      input_dim: 384
      tokenizer: 
        name: sundial
        out_dim: 256
    - name: eog_original
      input_dim: 384
      tokenizer: 
        name: sundial
        out_dim: 256
    - name: emg_original
      input_dim: 384
      tokenizer: 
        name: sundial
        out_dim: 256
    - name: spo2
      input_dim: 12
      tokenizer: 
        name: sundial
        out_dim: 256
    - name: resp_original
      input_dim: 12
      tokenizer: 
        name: sundial
        out_dim: 256
    - name: resp_nasal_original
      input_dim: 12
      tokenizer: 
        name: sundial
        out_dim: 256
loss:
  name: weighted_info_nce
  temperature: 0.2
  params:
    hard_scale: 0.10
    pos_margin: 0.0
data:
  mask_rate: 0.15
  max_tokens: 600
  token_sec: 3
model_averaging:
  name: ema
  params:
    enabled: true
    base_momentum: 0.996
    final_momentum: 1.0
    use_for_eval: true