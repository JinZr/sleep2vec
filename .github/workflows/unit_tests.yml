name: unit_tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: unit_tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-unit-tests.txt
            .github/workflows/unit_tests.yml
            pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep torch separate to force the CPU wheel on GitHub runners.
          python -m pip install torch==2.10.0 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements-unit-tests.txt

      - name: Run unit tests
        run: |
          pytest -q \
            tests/test_metadata_task_validation.py \
            tests/test_config_loading.py \
            tests/test_common_finetune_apply.py \
            tests/test_registries_and_builders.py \
            tests/test_losses.py \
            tests/test_checkpoints.py
