name: style_check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: style_check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style_check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            .flake8

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install black==24.10.0 flake8==7.1.1 isort==5.13.2

      - name: Run isort
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          isort --check-only .

      - name: Run black
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          black --check .

      - name: Run flake8
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          flake8 .
