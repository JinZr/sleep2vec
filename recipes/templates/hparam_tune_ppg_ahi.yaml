name: ppg_ahi_val_tuning_example
task: hparam_tune
variant: sleep2vec

experiment:
  id: ASK_USER
  title: ASK_USER
  objective: ASK_USER
  root: ASK_USER
  baseline: ASK_USER
step:
  id: ASK_USER
  phase: train
  purpose: ASK_USER

base_recipe: finetune_ppg_ahi_val_only.yaml

search:
  method: grid
  max_runs: 12
  parameters:
    runtime.lr: [1.0e-6, 3.0e-6, 1.0e-5]
    runtime.batch_size: [8, 12]
    runtime.weight_decay: [1.0e-5, 1.0e-4]

evaluation_policy:
  selection_metric: val_ahi_pearson
  selection_mode: max
  selection_split: val
  final_eval_split: test
  external_test_locked: true
  require_manual_unlock_for_final_test: true
  test_after_fit: false
  final_test_unlocked: false

decisions:
  task:
    value: hparam_tune
    source: explicit_recipe
  label_name:
    value: ahi
    source: explicit_recipe
  external_test_locked:
    value: true
    source: explicit_recipe
  train_val_test_policy:
    value: "select on val; keep test locked"
    source: explicit_recipe
  overwrite_policy:
    value: false
    source: explicit_recipe
  final_eval_unlock:
    value: false
    source: explicit_recipe
