name: sleep2vec2_ppg_ahi_val_tuning_example
task: hparam_tune
variant: sleep2vec2

base_recipe: finetune_sleep2vec2_ppg_ahi_val_only.yaml

search:
  method: grid
  max_trials: 6
  parameters:
    runtime.lr: [1.0e-6, 3.0e-6]
    runtime.batch_size: [8, 12]

evaluation_policy:
  selection_metric: val_ahi_pearson
  selection_mode: max
  selection_split: val
  final_eval_split: test
  external_test_locked: true
  require_manual_unlock_for_final_test: true
  test_after_fit: false
  final_test_unlocked: false

artifacts:
  plan_dir: artifacts/agent_plans/sleep2vec2_ppg_ahi_val_tuning
  generated_config_dir: runs/generated/sleep2vec2_ppg_ahi_val_tuning/configs

decisions:
  task:
    value: hparam_tune
    source: explicit_recipe
  label_name:
    value: ahi
    source: explicit_recipe
  external_test_locked:
    value: true
    source: explicit_recipe
  train_val_test_policy:
    value: "select on val; keep test locked"
    source: explicit_recipe
  overwrite_policy:
    value: false
    source: explicit_recipe
  final_eval_unlock:
    value: false
    source: explicit_recipe
