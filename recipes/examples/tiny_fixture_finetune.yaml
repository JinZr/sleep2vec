schema_version: 1
name: tiny_fixture_finetune
task: finetune
variant: sleep2vec

inputs:
  config: recipes/examples/fixtures/tiny_finetune_config.yaml
  label_name: ahi
  pretrained_backbone_path: null

runtime:
  devices: [0]
  precision: bf16-mixed
  epochs: 1
  batch_size: 1
  num_workers: 0
  lr: 1.0e-6
  weight_decay: 1.0e-5

artifacts:
  version_name: tiny-fixture
  results_csv_path: results/tiny_fixture_results.csv

evaluation_policy:
