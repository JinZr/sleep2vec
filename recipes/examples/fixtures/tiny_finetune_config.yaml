model:
  backbone:
    name: roformer
    hidden_size: 8
  projection:
    name: simclr
    enabled: true
  cls:
    embedding_type: bert
    downstream: tokens
  channels:
    - name: ppg
      input_dim: 8
      tokenizer:
        name: linear
        out_dim: 8
  head:
    name: classification
    channel_agg:
      name: mean
      kwargs: {}
    temporal_agg:
      name: mean
      kwargs: {}

data:
  backend: npz
  max_tokens: 4
  data_channel_names: [ppg]
  finetune_data_index: recipes/examples/fixtures/tiny_index.csv
  finetune_preset_path: null

finetune:
  task:
    type: classification
    output_dim: 30
    is_seq: true
    monitor: val_ahi_pearson
    monitor_mod: max

preset_build:
  required_channels: [ppg, ahi, stage5]
  min_channels: 3
