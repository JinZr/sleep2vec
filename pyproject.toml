[tool.black]
line-length = 120
target-version = ["py310"]
exclude = '''
/(\.git|\.venv|\.mypy_cache|\.pytest_cache|build|dist|\.eggs|\.idea|\.vscode|logs|log-[^/]+|wandb|checkpoints|outputs|\.ipynb_checkpoints)
'''

[tool.isort]
profile = "black"
line_length = 120
default_section = "THIRDPARTY"
known_first_party = ["sleep2vec", "sleep2vec2", "sleep2expert"]
combine_as_imports = true
force_sort_within_sections = true
skip_gitignore = true
