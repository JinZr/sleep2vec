
approved_defaults:
  wandb_mode:
    value: offline
    reason: "Offline logging is safe for local agent runs."

  num_workers:
    value: 8
    reason: "Runtime convenience value; does not change experiment semantics."

  precision:
    value: bf16-mixed
    reason: "Allowed when GPU supports it; otherwise the runtime may fail clearly."

  test_after_fit_for_hparam_tune:
    value: false
    reason: "External test should remain locked during hyper-parameter search."

  output_dir_for_agent_context:
    value: artifacts/agent_context
    reason: "Generated context bundles are noncanonical artifacts."

  output_dir_for_agent_plans:
    value: artifacts/agent_plans
    reason: "Generated plans are noncanonical artifacts."

not_approved_as_defaults:
  - label_name
  - task
  - selection_metric
  - selection_mode
  - external_test_locked
  - final_eval_split
  - pretrained_backbone_path
  - ckpt_path
  - overwrite
  - preset_regeneration
  - hparam_search_space
  - hparam_budget
  - train_val_test_policy
  - required_channels
  - min_channels
